services:
  _defaults:
    autowire: true
    autoconfigure: true

  App\:
    resource: "../src/"
    exclude:
      - "../src/DependencyInjection/"
      - "../src/Entity/"
      - "../src/Kernel.php"

  # ── Instance ID request listener ─────────────────────────
  App\EventListener\InstanceRequestListener:
    tags:
      - { name: kernel.event_listener, event: kernel.request, method: onKernelRequest, priority: 20 }

  # ── Instance ID Doctrine listener ────────────────────────
  App\EventListener\InstanceDoctrineListener:
    tags:
      - { name: doctrine.event_listener, event: prePersist }
