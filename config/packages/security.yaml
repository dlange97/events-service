security:
  providers:
    jwt:
      lexik_jwt:
        class: App\Security\JwtUser

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    health:
      pattern: ^/events/health$
      security: false

    api:
      pattern: "^/events(?:$|/)"
      stateless: true
      provider: jwt
      jwt: ~

  access_control:
    - { path: "^/events/health", roles: PUBLIC_ACCESS }
    - { path: "^/events/docs(?:\\.json)?$", roles: PUBLIC_ACCESS }
    - {
        path: "^/events/routes",
        methods: [GET],
        allow_if: "user and 'map.view' in user.getPermissions()",
      }
    - {
        path: "^/events/routes",
        methods: [POST, PATCH, PUT, DELETE],
        allow_if: "user and 'routes.manage' in user.getPermissions()",
      }
    - {
        path: "^/events(?:$|/(?!routes))",
        methods: [GET],
        allow_if: "user and 'events.view' in user.getPermissions()",
      }
    - {
        path: "^/events(?:$|/(?!routes))",
        methods: [POST, PATCH, PUT, DELETE],
        allow_if: "user and 'events.manage' in user.getPermissions()",
      }
    - { path: "^/events(?:$|/)", roles: ROLE_USER }
